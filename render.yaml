services:
  - type: web
    name: skin-lesion-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
